<h2>Coverage area</h2>
<p class="subtitle">How much of the page does the aurora fill?</p>

<div class="split">

  <div class="mockup" data-choice="hero" onclick="toggleSelect(this)" style="cursor:pointer;">
    <div class="mockup-header">A — Hero only</div>
    <div class="mockup-body" style="padding:0;background:#111;min-height:340px;position:relative;overflow:hidden;font-family:monospace;">

      <!-- Hero zone with aurora -->
      <div style="height:190px;position:relative;overflow:hidden;background:#110d05;">
        <div style="position:absolute;inset:0;">
          <div style="position:absolute;width:110%;height:180px;top:-40px;left:-5%;background:radial-gradient(ellipse at 35% 60%,rgba(251,146,60,0.5) 0%,transparent 58%);filter:blur(30px);animation:m1 10s ease-in-out infinite;"></div>
          <div style="position:absolute;width:80%;height:160px;top:-20px;left:25%;background:radial-gradient(ellipse at 55% 45%,rgba(236,72,153,0.38) 0%,transparent 52%);filter:blur(34px);animation:m2 13s ease-in-out infinite;"></div>
          <div style="position:absolute;width:70%;height:140px;top:30px;left:15%;background:radial-gradient(ellipse at 45% 70%,rgba(245,158,11,0.35) 0%,transparent 48%);filter:blur(26px);animation:m3 16s ease-in-out infinite;"></div>
        </div>
        <div style="position:relative;z-index:2;padding:20px;text-align:center;">
          <div style="width:40px;height:40px;border-radius:50%;background:#fb923c;margin:0 auto 10px;opacity:0.8;"></div>
          <div style="font-size:22px;color:#fff;letter-spacing:0.04em;font-family:serif;">Derek Montgomery</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px;letter-spacing:0.1em;">SENIOR SOFTWARE ENGINEER</div>
        </div>
      </div>

      <!-- Below fold — plain dark -->
      <div style="height:150px;background:#1a1a1a;padding:16px;">
        <div style="font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:0.12em;text-align:center;margin-bottom:12px;">SELECTED WORK</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <div style="background:#222;border-radius:6px;height:70px;border:1px solid #2a2a2a;"></div>
          <div style="background:#222;border-radius:6px;height:70px;border:1px solid #2a2a2a;"></div>
          <div style="background:#222;border-radius:6px;height:70px;border:1px solid #2a2a2a;"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="mockup" data-choice="fullpage" onclick="toggleSelect(this)" style="cursor:pointer;">
    <div class="mockup-header">B — Full page (fixed)</div>
    <div class="mockup-body" style="padding:0;min-height:340px;position:relative;overflow:hidden;background:#110d05;">

      <!-- Aurora covers everything -->
      <div style="position:absolute;inset:0;">
        <div style="position:absolute;width:110%;height:280px;top:-60px;left:-5%;background:radial-gradient(ellipse at 35% 60%,rgba(251,146,60,0.42) 0%,transparent 58%);filter:blur(34px);animation:m1 10s ease-in-out infinite;"></div>
        <div style="position:absolute;width:80%;height:240px;top:40px;left:25%;background:radial-gradient(ellipse at 55% 45%,rgba(236,72,153,0.3) 0%,transparent 52%);filter:blur(38px);animation:m2 13s ease-in-out infinite;"></div>
        <div style="position:absolute;width:70%;height:200px;top:160px;left:5%;background:radial-gradient(ellipse at 45% 70%,rgba(245,158,11,0.28) 0%,transparent 48%);filter:blur(30px);animation:m3 16s ease-in-out infinite;"></div>
      </div>

      <!-- Content over aurora -->
      <div style="position:relative;z-index:2;">
        <div style="height:190px;padding:20px;text-align:center;">
          <div style="width:40px;height:40px;border-radius:50%;background:#fb923c;margin:0 auto 10px;opacity:0.8;"></div>
          <div style="font-size:22px;color:#fff;letter-spacing:0.04em;font-family:serif;">Derek Montgomery</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px;letter-spacing:0.1em;">SENIOR SOFTWARE ENGINEER</div>
        </div>
        <div style="height:150px;padding:16px;">
          <div style="font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.12em;text-align:center;margin-bottom:12px;">SELECTED WORK</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
            <div style="background:rgba(255,255,255,0.05);border-radius:6px;height:70px;border:1px solid rgba(255,255,255,0.08);"></div>
            <div style="background:rgba(255,255,255,0.05);border-radius:6px;height:70px;border:1px solid rgba(255,255,255,0.08);"></div>
            <div style="background:rgba(255,255,255,0.05);border-radius:6px;height:70px;border:1px solid rgba(255,255,255,0.08);"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<style>
@keyframes m1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(5%,-9%) scale(1.1)} }
@keyframes m2 { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(-6%,7%) scale(0.92)} 70%{transform:translate(4%,-5%) scale(1.06)} }
@keyframes m3 { 0%,100%{transform:translate(0,0) scale(1)} 60%{transform:translate(6%,6%) scale(1.09)} }

.mockup[data-choice]:hover { outline: 2px solid rgba(251,146,60,0.4); }
.mockup[data-choice].selected { outline: 2px solid #fb923c; }
</style>
